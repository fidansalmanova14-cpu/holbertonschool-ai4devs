{
  "openapi": "3.0.3",
  "info": { "title": "Network Device Inventory API", "version": "1.0.0" },
  "security": [{ "bearerAuth": [] }],
  "paths": {
    "/devices": {
      "get": {
        "summary": "List devices",
        "parameters": [
          { "name": "limit", "in": "query", "schema": { "type": "integer", "default": 10 } },
          { "name": "offset", "in": "query", "schema": { "type": "integer", "default": 0 } }
        ],
        "responses": { "200": { "description": "OK" }, "401": { "description": "Unauthorized" } }
      },
      "post": {
        "summary": "Create device",
        "responses": { "201": { "description": "Created" } }
      }
    },
    "/devices/{id}": {
      "get": { "summary": "Get device", "parameters": [{ "name": "id", "in": "path", "required": true, "schema": { "type": "string" } }], "responses": { "200": { "description": "OK" }, "404": { "description": "Not Found" } } },
      "put": { "summary": "Update device", "responses": { "200": { "description": "Updated" } } },
      "delete": { "summary": "Delete device", "responses": { "204": { "description": "Deleted" } } }
    },
    "/devices/search": {
      "get": {
        "summary": "Search",
        "parameters": [{ "name": "q", "in": "query", "schema": { "type": "string" } }],
        "responses": { "200": { "description": "Success" } }
      }
    }
  },
  "components": {
    "securitySchemes": {
      "bearerAuth": { "type": "http", "scheme": "bearer", "bearerFormat": "JWT" }
    }
  }
}

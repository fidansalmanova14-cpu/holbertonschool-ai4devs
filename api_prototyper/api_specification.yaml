openapi: 3.0.3
info:
  title: Network Device Inventory API
  version: 1.0.0
  description: API for managing network assets with JWT security and full CRUD.
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Device:
      type: object
      properties:
        id: { type: string }
        hostname: { type: string }
        status: { type: string }
    Error:
      type: object
      properties:
        message: { type: string }
security:
  - bearerAuth: []
paths:
  /devices:
    get:
      summary: List all devices (with pagination)
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 10 }
        - name: offset
          in: query
          schema: { type: integer, default: 0 }
      responses:
        '200': { description: Successful }
        '401': { description: Unauthorized }
    post:
      summary: Create device
      responses:
        '201': { description: Created }
        '400': { description: Bad Request }
  /devices/{id}:
    get:
      summary: Get device details
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      responses:
        '200': { description: OK }
        '404': { description: Not Found }
    put:
      summary: Update device
      responses:
        '200': { description: Updated }
        '404': { description: Not Found }
    delete:
      summary: Delete device
      responses:
        '204': { description: Deleted }
  /devices/{id}/status:
    patch:
      summary: Update only device status (5th Endpoint)
      responses:
        '200': { description: Status Updated }
        '400': { description: Invalid Status }
